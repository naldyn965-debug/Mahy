<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ MAHY ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,900&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   CSS VARIABLES & RESET
══════════════════════════════════════ */
:root {
  --gold:    #ffd700;
  --pink:    #ff3d8b;
  --soft:    #ff8fab;
  --deep:    #040010;
  --spring:  cubic-bezier(.175,.885,.32,1.275);
  --smooth:  cubic-bezier(.25,.46,.45,.94);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; }
body {
  background: radial-gradient(ellipse at 28% -5%, #260055 0%, #080018 45%, #000008 100%);
  cursor:none;
  font-family:'Playfair Display',Georgia,serif;
  user-select:none; -webkit-user-select:none;
}

/* ══════════════════════════════════════
   CANVASES
══════════════════════════════════════ */
canvas {
  position:fixed; inset:0;
  width:100%; height:100%;
  pointer-events:none;
}
#sCvs { z-index:1; }
#cCvs { z-index:200; }

/* ══════════════════════════════════════
   AURORA
══════════════════════════════════════ */
.aurora {
  position:fixed; inset:0;
  pointer-events:none; z-index:2; overflow:hidden;
}
.aurora::before {
  content:'';
  position:absolute; inset:-35%;
  background:
    radial-gradient(ellipse at 22% 18%, rgba(130,0,255,.12) 0%, transparent 52%),
    radial-gradient(ellipse at 78% 82%, rgba(255,0,100,.10) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,100,0,.04) 0%, transparent 45%);
  filter:blur(32px);
  animation:aurDrift 20s ease-in-out infinite alternate;
}
@keyframes aurDrift {
  from { transform:translate(0,0) rotate(0deg); opacity:.55; }
  to   { transform:translate(5%,6%) rotate(5deg); opacity:1; }
}

/* ══════════════════════════════════════
   BG PARTICLES
══════════════════════════════════════ */
#bgP { position:fixed; inset:0; pointer-events:none; z-index:3; overflow:hidden; }

.fh {
  position:absolute; pointer-events:none;
  color:rgba(255,80,130,.35); font-style:normal; line-height:1;
  animation:fhUp linear both;
}
@keyframes fhUp {
  0%   { opacity:0; transform:translateY(102vh) scale(.5) rotate(0deg); }
  6%   { opacity:.65; }
  94%  { opacity:.2; }
  100% { opacity:0; transform:translateY(-8vh) scale(1.1) rotate(380deg); }
}

.fp {
  position:absolute; pointer-events:none;
  border-radius:60% 40% 60% 40% / 50% 50% 50% 50%;
  filter:blur(.4px);
  animation:fpFall linear both;
}
@keyframes fpFall {
  0%   { opacity:0; transform:translateY(-25px) translateX(0) rotate(0deg); }
  8%   { opacity:.8; }
  92%  { opacity:.3; }
  100% { opacity:0; transform:translateY(106vh) translateX(90px) rotate(560deg); }
}

.ff {
  position:absolute; pointer-events:none;
  width:3px; height:3px; border-radius:50%;
  background:rgba(255,255,160,.95);
  box-shadow:0 0 4px 3px rgba(255,255,100,.4);
  animation:ffMv ease-in-out infinite alternate, ffBl 2.5s ease-in-out infinite;
}
@keyframes ffMv  { from{transform:translate(0,0)} to{transform:translate(var(--dx),var(--dy))} }
@keyframes ffBl  {
  0%,100% { opacity:.1; box-shadow:0 0 2px 1px rgba(255,255,100,.15); }
  50%     { opacity:1;  box-shadow:0 0 8px 5px rgba(255,255,100,.7); }
}

/* ══════════════════════════════════════
   CURSOR
══════════════════════════════════════ */
#cur {
  position:fixed; pointer-events:none; z-index:9999;
  font-size:18px; transform:translate(-50%,-50%);
  will-change:left,top; transition:font-size .15s var(--spring);
}
.ct {
  position:fixed; pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%); font-style:normal; line-height:1;
  animation:ctFd .9s ease forwards;
}
@keyframes ctFd {
  from { opacity:.85; transform:translate(-50%,-50%) scale(1); }
  to   { opacity:0;   transform:translate(-50%,-50%) scale(.25); }
}

/* ══════════════════════════════════════
   SCENE & CARD
══════════════════════════════════════ */
.scene {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:10; perspective:1500px;
}
#cw { transform-style:preserve-3d; will-change:transform; }

#card {
  position:relative;
  width:clamp(308px,88vw,438px);
  height:clamp(448px,83vh,578px);
  border-radius:28px;
  overflow:hidden;
  transform-style:preserve-3d;
  animation:cardIn 1.5s var(--spring) .3s both, cardBreath 5s ease-in-out 2.5s infinite;
  box-shadow:
    0 0 0 1px rgba(255,215,0,.1),
    0 0 55px rgba(255,215,0,.08),
    0 0 110px rgba(255,0,100,.05),
    0 32px 84px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.1);
}
@keyframes cardIn {
  from { opacity:0; transform:scale(.58) translateY(75px) rotateX(22deg); }
  to   { opacity:1; transform:scale(1) translateY(0) rotateX(0); }
}
@keyframes cardBreath {
  0%,100% { box-shadow:0 0 0 1px rgba(255,215,0,.1), 0 0 55px rgba(255,215,0,.08), 0 32px 84px rgba(0,0,0,.7); }
  50%      { box-shadow:0 0 0 1px rgba(255,215,0,.18), 0 0 80px rgba(255,215,0,.14), 0 0 110px rgba(255,0,100,.08), 0 32px 84px rgba(0,0,0,.7); }
}

/* Card BG */
.cbg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 50% 0%,   rgba(70,5,60,.75) 0%, transparent 58%),
    radial-gradient(ellipse at 50% 100%, rgba(12,0,30,.9)  0%, transparent 50%),
    linear-gradient(155deg, rgba(20,4,46,.97) 0%, rgba(7,0,20,.99) 100%);
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
}

/* Animated gold border */
.cbd {
  position:absolute; inset:-2px; border-radius:30px;
  z-index:0; overflow:hidden; pointer-events:none;
}
.cbd::before {
  content:'';
  position:absolute;
  top:50%; left:50%;
  width:215%; height:215%;
  margin:-107.5% 0 0 -107.5%;
  background:conic-gradient(from 0deg,
    transparent 0deg, var(--gold) 55deg, var(--pink) 110deg,
    transparent 170deg, var(--gold) 225deg, #ffab00 285deg, transparent 360deg
  );
  animation:bdSpin 4.5s linear infinite;
}
.cbd::after {
  content:''; position:absolute;
  inset:2px; border-radius:28px;
  background:linear-gradient(155deg, rgba(20,4,46,.97) 0%, rgba(7,0,20,.99) 100%);
}
@keyframes bdSpin { to { transform:rotate(360deg); } }

/* Glass reflection */
.crf {
  position:absolute; inset:0; border-radius:28px;
  pointer-events:none; z-index:1;
  background:linear-gradient(162deg, rgba(255,255,255,.09) 0%, rgba(255,255,255,.02) 30%, transparent 60%);
}

/* Card inner */
.ci {
  position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px 18px;
}

/* Ornaments */
.orn {
  position:absolute;
  font-size:17px; color:rgba(255,215,0,.22);
  font-style:normal; line-height:1; pointer-events:none; z-index:2;
}
.orn.tl{top:13px; left:14px;}
.orn.tr{top:13px; right:14px; transform:scaleX(-1);}
.orn.bl{bottom:13px; left:14px; transform:scaleY(-1);}
.orn.br{bottom:13px; right:14px; transform:scale(-1);}

/* Header / Footer */
.ch {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
  font-size:11px; letter-spacing:5px; color:rgba(255,215,0,.42);
  white-space:nowrap; text-transform:uppercase; z-index:2; pointer-events:none;
}
.cf {
  position:absolute; bottom:17px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:3px; color:rgba(255,80,150,.28);
  white-space:nowrap; font-family:'Cormorant Garamond',serif;
  font-style:italic; z-index:2; pointer-events:none;
}

/* Card shake */
@keyframes cShk {
  0%,100% { transform:rotate(0) scale(1); }
  14%  { transform:rotate(-2.5deg) scale(1.02); }
  28%  { transform:rotate(2.2deg) scale(1.02); }
  42%  { transform:rotate(-1.8deg) scale(1.01); }
  57%  { transform:rotate(1.5deg) scale(1.01); }
  71%  { transform:rotate(-.6deg); }
  85%  { transform:rotate(.5deg); }
}
#card.shk { animation:cShk .55s ease; }

/* ══════════════════════════════════════
   BOUQUET
══════════════════════════════════════ */
#bq {
  position:relative;
  width:242px; height:268px;
  flex-shrink:0;
  animation:bqFloat 5.5s ease-in-out infinite;
}
@keyframes bqFloat {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-7px); }
}

.rw {
  position:absolute; cursor:pointer;
  transform:rotate(var(--ir,0deg));
  transform-origin:50% 100%;
  transition:filter .22s ease;
  will-change:filter,transform;
}
.rw:hover {
  filter:brightness(1.3) drop-shadow(0 0 18px rgba(255,80,130,.95));
  z-index:5 !important;
}
.rw svg { display:block; pointer-events:none; overflow:visible; }

@keyframes rosePop {
  0%   { transform:rotate(var(--ir)) scale(1) translateY(0);   filter:none; }
  28%  { transform:rotate(calc(var(--ir) + 13deg)) scale(1.38) translateY(-15px); filter:brightness(1.5) drop-shadow(0 0 24px rgba(255,80,130,1)); }
  55%  { transform:rotate(calc(var(--ir) - 7deg)) scale(1.18) translateY(-7px);  filter:brightness(1.2); }
  78%  { transform:rotate(calc(var(--ir) + 2.5deg)) scale(1.06) translateY(-2px); }
  100% { transform:rotate(var(--ir)) scale(1) translateY(0);   filter:none; }
}
.rw.pop { animation:rosePop .72s var(--spring); z-index:6 !important; }

/* ══════════════════════════════════════
   BUTTERFLIES
══════════════════════════════════════ */
.bfly {
  position:absolute; width:32px; height:22px;
  pointer-events:none; z-index:4;
  animation:bfPath ease-in-out infinite;
}
@keyframes bfPath {
  0%   { transform:translate(0,0) rotate(0deg); }
  20%  { transform:translate(var(--b1x),var(--b1y)) rotate(var(--b1r)); }
  50%  { transform:translate(var(--b2x),var(--b2y)) rotate(var(--b2r)); }
  75%  { transform:translate(var(--b3x),var(--b3y)) rotate(var(--b3r)); }
  100% { transform:translate(0,0) rotate(0deg); }
}
.bw {
  position:absolute; top:50%;
  width:16px; height:12px;
}
.bw.l {
  right:50%; transform-origin:right center;
  border-radius:80% 20% 80% 80%;
  animation:bwFL .26s ease-in-out infinite alternate;
}
.bw.r {
  left:50%; transform-origin:left center;
  border-radius:20% 80% 20% 80%;
  animation:bwFR .26s ease-in-out infinite alternate;
}
@keyframes bwFL { from{transform:perspective(200px) rotateY(0)} to{transform:perspective(200px) rotateY(-55deg)} }
@keyframes bwFR { from{transform:perspective(200px) rotateY(0)} to{transform:perspective(200px) rotateY(55deg)} }
.bb {
  position:absolute; left:50%; top:50%;
  width:4px; height:13px; border-radius:50%;
  transform:translate(-50%,-50%);
}

/* Ambient sparkles */
.sa {
  position:absolute; width:5px; height:5px;
  border-radius:50%; background:white; pointer-events:none;
  animation:saPulse ease-in-out infinite;
}
@keyframes saPulse {
  0%,100% { opacity:0; transform:scale(0); }
  50% { opacity:.92; transform:scale(1.5); box-shadow:0 0 7px 3px rgba(255,255,210,.8); }
}

/* ══════════════════════════════════════
   RIPPLE
══════════════════════════════════════ */
.rpl {
  position:absolute; border-radius:50%;
  border:1.5px solid rgba(255,215,0,.75);
  pointer-events:none;
  transform:translate(-50%,-50%) scale(0);
  animation:rplEx 1s ease-out forwards;
}
@keyframes rplEx {
  0%   { width:4px; height:4px; opacity:1; transform:translate(-50%,-50%) scale(0); }
  100% { width:170px; height:170px; opacity:0; transform:translate(-50%,-50%) scale(1); }
}

/* ══════════════════════════════════════
   MAHY OVERLAY
══════════════════════════════════════ */
#mo {
  position:absolute; inset:0; border-radius:26px;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  z-index:20; opacity:0; pointer-events:none;
  transition:opacity .7s ease, background .8s ease;
}
#mo.vis {
  opacity:1;
  background:radial-gradient(ellipse at 50% 50%, rgba(8,0,26,.94) 0%, rgba(3,0,12,.97) 100%);
}

/* Glow ring */
#gr {
  position:absolute;
  width:210px; height:210px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,50,150,.32) 0%, rgba(255,200,0,.13) 45%, transparent 72%);
  opacity:0; transform:scale(.2);
  transition:opacity .9s ease, transform .9s var(--spring);
  pointer-events:none;
}
#gr.show { opacity:1; transform:scale(1); animation:grPulse 3.2s ease-in-out infinite 1s; }
@keyframes grPulse {
  0%,100% { transform:scale(1); opacity:1; }
  50%     { transform:scale(1.22); opacity:.6; }
}

/* Light rays container */
#rc {
  position:absolute; inset:0;
  opacity:0; transition:opacity 1.3s ease;
  pointer-events:none; overflow:hidden;
}
#rc.show { opacity:.38; }
.ray {
  position:absolute; top:50%; left:50%;
  width:1.5px; transform-origin:0 0;
  background:linear-gradient(to bottom, rgba(255,210,0,.65), transparent);
}

/* MAHY letters */
#mt {
  position:relative; display:flex;
  gap:clamp(1px,1.1vw,9px); z-index:1;
}
.lt {
  display:inline-block;
  font-family:'Playfair Display',serif;
  font-weight:900; font-style:italic;
  font-size:clamp(55px,11.5vw,96px);
  background:linear-gradient(135deg, #ffd700 0%, #ffab00 22%, #ff9a9e 52%, #ff3d8b 78%, #ffd700 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  opacity:0; will-change:transform,opacity,filter; position:relative;
  letter-spacing:-1px;
}
/* Shine sweep */
#ms {
  position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.58), transparent);
  transform:skewX(-18deg) translateX(-120%);
  pointer-events:none; opacity:0;
}
@keyframes msGo {
  from { transform:skewX(-18deg) translateX(-120%); opacity:1; }
  to   { transform:skewX(-18deg) translateX(210%);  opacity:1; }
}
/* Pulse after reveal */
@keyframes ltPulse {
  0%,100% { filter:drop-shadow(0 0 6px rgba(255,80,150,.5)); transform:scale(1); }
  50%     { filter:drop-shadow(0 0 24px rgba(255,80,150,1)); transform:scale(1.06); }
}
.lt.pulse { animation:ltPulse 3s ease-in-out infinite; }

/* ══════════════════════════════════════
   HINT & MUSIC BTN
══════════════════════════════════════ */
#hint {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:14px; letter-spacing:2px; color:rgba(255,170,200,.65);
  pointer-events:none; z-index:50; white-space:normal;
  text-align:center; max-width:88vw; direction:rtl;
  animation:hintP 3s ease-in-out infinite;
}
@keyframes hintP {
  0%,100% { opacity:.45; transform:translateX(-50%) translateY(0); }
  50%     { opacity:.92; transform:translateX(-50%) translateY(-6px); }
}
#mb {
  position:fixed; top:20px; right:20px;
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,215,0,.3);
  color:rgba(255,215,0,.85); font-size:18px;
  cursor:pointer; z-index:500; outline:none; padding:0;
  display:flex; align-items:center; justify-content:center;
  transition:all .3s ease;
}
#mb:hover {
  background:rgba(255,50,130,.22);
  border-color:rgba(255,215,0,.65);
  box-shadow:0 0 24px rgba(255,50,130,.45);
  transform:scale(1.14);
}
#mb.on {
  border-color:rgba(255,215,0,.7);
  animation:mbPulse 1.6s ease-in-out infinite;
}
@keyframes mbPulse {
  0%,100% { box-shadow:0 0 10px rgba(255,215,0,.3); }
  50%     { box-shadow:0 0 30px rgba(255,215,0,.7); }
}

/* ══════════════════════════════════════
   POST-MAHY ELEMENTS
══════════════════════════════════════ */
.rh {
  position:fixed; pointer-events:none; z-index:150;
  animation:rhRise linear forwards;
}
@keyframes rhRise {
  0%   { opacity:1; transform:translateY(0) scale(.5) rotate(0); }
  80%  { opacity:.7; }
  100% { opacity:0; transform:translateY(-90vh) scale(1.5) rotate(var(--rr)); }
}
.sb {
  position:fixed; pointer-events:none; z-index:150;
  width:5px; height:5px; border-radius:50%;
  animation:sbAnim linear forwards;
}
@keyframes sbAnim {
  from { opacity:1; transform:translate(0,0) scale(1); }
  to   { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0); }
}
.lf {
  position:fixed; pointer-events:none; z-index:180;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.85) 0%, rgba(255,215,0,.4) 30%, transparent 70%);
  animation:lfAnim 1.2s ease forwards;
}
@keyframes lfAnim {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0); }
  28%  { opacity:.9; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(1.6); }
}

/* ══════════════════════════════════════
   RESPONSIVE & A11Y
══════════════════════════════════════ */
@media(max-width:390px){
  #bq { transform:scale(.8); transform-origin:center top; }
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.01ms!important; }
}

/* ══════════════════════════════════════
   LOVE CONTENT
══════════════════════════════════════ */
#lv-sub {
  direction:rtl; text-align:center; z-index:1; width:100%;
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(12px,3vw,16px); line-height:1.9;
  color:rgba(255,165,205,.92); letter-spacing:.4px;
  margin-top:11px; padding:0 18px;
  opacity:0; transform:translateY(14px);
  transition:opacity 1.3s ease .4s, transform 1.3s ease .4s;
  pointer-events:none;
  text-shadow:0 0 18px rgba(255,80,130,.55);
}
#lv-sub.vis { opacity:1; transform:translateY(0); }

#lv-msg {
  direction:rtl; text-align:center; z-index:1;
  min-height:26px; margin-top:7px; padding:0 14px;
  opacity:0; transition:opacity .6s ease;
  pointer-events:none;
}
#lv-msg.vis { opacity:1; }
.lm-t {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(9px,2.3vw,13px); letter-spacing:1px;
  color:rgba(255,215,0,.8);
  animation:lmFd 4.5s ease forwards;
}
@keyframes lmFd {
  0%  { opacity:0; transform:translateY(7px); }
  14% { opacity:1; transform:translateY(0); }
  76% { opacity:1; }
  100%{ opacity:0; }
}

#lv-acts {
  display:flex; gap:5px; flex-wrap:wrap; width:100%;
  justify-content:center; direction:rtl;
  margin-top:9px; padding:0 10px; z-index:1;
  opacity:0; transition:opacity .9s ease;
  pointer-events:none;
}
#lv-acts.vis { opacity:1; }
.la {
  background:rgba(255,30,100,.10);
  border:1px solid rgba(255,100,160,.24);
  border-radius:20px; padding:3px 9px;
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(8px,2vw,11px);
  color:rgba(255,190,215,.82); white-space:nowrap;
  opacity:0; transform:translateY(8px) scale(.85);
  transition:opacity .4s ease, transform .4s var(--spring);
}
.la.vis { opacity:1; transform:translateY(0) scale(1); }

/* Back button */
#rb {
  position:absolute; bottom:14px; left:50%;
  transform:translateX(-50%) scale(.8);
  border-radius:20px; padding:5px 18px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,215,0,.18);
  color:rgba(255,190,210,.72);
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:11px; letter-spacing:1.5px; direction:rtl;
  cursor:pointer; z-index:30; outline:none; white-space:nowrap;
  opacity:0;
  transition:opacity .6s ease, transform .6s var(--spring), background .25s ease, box-shadow .25s ease;
  pointer-events:none;
}
#rb.vis { opacity:1; transform:translateX(-50%) scale(1); pointer-events:auto; }
#rb:hover {
  background:rgba(255,50,130,.15);
  border-color:rgba(255,215,0,.4);
  box-shadow:0 0 14px rgba(255,50,130,.28);
}
</style>
</head>
<body>

<canvas id="sCvs"></canvas>
<canvas id="cCvs"></canvas>
<div class="aurora"></div>
<div id="bgP"></div>
<div id="cur">♡</div>

<div class="scene">
  <div id="cw">
    <div id="card">
      <div class="cbg"></div>

<script>

let stars = [];
function initStars() {
  stars = [];
  const n = Math.min(240, Math.round(W * H / 4800));
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.7 + .22,
      phase: Math.random() * Math.PI * 2,
      sp: Math.random() * .007 + .002,
      col: Math.random()<.13 ? '#ffc8c8' : Math.random()<.13 ? '#c8c8ff' : '#ffffff',
    });
  }
}
initStars();

function drawStars() {
  sX.clearRect(0, 0, W, H);
  for (const s of stars) {
    s.phase += s.sp;
    const op = (Math.sin(s.phase) + 1) / 2 * .88 + .12;
    sX.globalAlpha = op;
    sX.fillStyle = s.col;
    sX.beginPath();
    sX.arc(s.x, s.y, s.r, 0, 6.283);
    sX.fill();
    if (s.r > 1.15) {
      const g = sX.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5.5);
      g.addColorStop(0, `rgba(255,255,255,${(op * .28).toFixed(3)})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      sX.globalAlpha = op * .4;
      sX.fillStyle = g;
      sX.beginPath();
      sX.arc(s.x, s.y, s.r * 5.5, 0, 6.283);
      sX.fill();
    }
  }
  sX.globalAlpha = 1;
}

const TH = {

let _uid=0;
function makeRose(type, W, H) {
  const c = TH[type]||TH.red;
  const id = 'r'+(_uid++);
  const ox = W/2, oy = Math.round(H*.43);

  const d1=Math.round(27*sc), d2=Math.round(20*sc), d3=Math.round(13*sc);
  const sw=Math.max(2.4,Math.round(3.8*sc));
  const sT=oy+cR+Math.round(5*sc);
  const lx1=ox-Math.round(13*sc), ly1=sT+Math.round(20*sc);
  const lx2=ox+Math.round(11*sc), ly2=sT+Math.round(33*sc);
  const lr=Math.round(14*sc), lry=Math.round(6*sc);

  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
<defs>

    <stop offset="100%" stop-color="${c.m[1]}"/>

  <radialGradient id="cg${id}" cx="38%" cy="38%" r="62%">
    <stop offset="0%" stop-color="${c.o[0]}"/>
    <stop offset="100%" stop-color="${c.c}"/>
  </radialGradient>
  <linearGradient id="sg${id}" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="${c.s}"/>
    <stop offset="50%" stop-color="${c.ll}"/>
    <stop offset="100%" stop-color="${c.s}"/>
  </linearGradient>
  <radialGradient id="lg${id}" cx="34%" cy="34%" r="66%">
    <stop offset="0%" stop-color="${c.ll}"/>
    <stop offset="100%" stop-color="${c.s}"/>
  </radialGradient>
  <filter id="gf${id}">
    <feGaussianBlur stdDeviation="1.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sf${id}" x="-60%" y="-40%" width="220%" height="180%">
    <feGaussianBlur stdDeviation="4.5"/>
  </filter>
</defs>
<ellipse cx="${ox}" cy="${oy+cR+3}" rx="${cR+10}" ry="${Math.round((cR+10)*.36)}" fill="rgba(0,0,0,.22)" filter="url(#sf${id})"/>
<path d="M${ox} ${sT} Q${ox-4} ${Math.round((sT+H)*.57)} ${ox+2} ${H}" stroke="url(#sg${id})" stroke-width="${sw}" fill="none" stroke-linecap="round"/>
<ellipse cx="${lx1}" cy="${ly1}" rx="${lr}" ry="${lry}" fill="url(#lg${id})" transform="rotate(-38 ${lx1} ${ly1})"/>
<path d="M${lx1-2} ${ly1} L${lx1+lr-5} ${ly1-4}" stroke="${c.s}" stroke-width=".9" fill="none" opacity=".42"/>
<ellipse cx="${lx2}" cy="${ly2}" rx="${Math.round(lr*.82)}" ry="${Math.round(lry*.82)}" fill="url(#lg${id})" transform="rotate(33 ${lx2} ${ly2})"/>
${[0,45,90,135,180,225,270,315].map(a=>`<ellipse cx="${ox}" cy="${oy-d1}" rx="${r1x}" ry="${r1y}" fill="url(#og${id})" opacity=".86" transform="rotate(${a} ${ox} ${oy})"/>`).join('')}
${[22,94,166,238,310].map(a=>`<ellipse cx="${ox}" cy="${oy-d2}" rx="${r2x}" ry="${r2y}" fill="url(#mg${id})" opacity=".92" transform="rotate(${a} ${ox} ${oy})"/>`).join('')}
${[0,72,144,216,288].map(a=>`<ellipse cx="${ox}" cy="${oy-d3}" rx="${r3x}" ry="${r3y}" fill="${c.i}" opacity=".94" transform="rotate(${a} ${ox} ${oy})"/>`).join('')}
<circle cx="${ox}" cy="${oy}" r="${cR}" fill="url(#cg${id})" filter="url(#gf${id})"/>
<circle cx="${ox}" cy="${oy}" r="${Math.round(cR*.62)}" fill="${c.c}"/>
<ellipse cx="${ox-Math.round(cR*.28)}" cy="${oy-Math.round(cR*.28)}" rx="${Math.round(cR*.38)}" ry="${Math.round(cR*.22)}" fill="rgba(255,255,255,.22)" transform="rotate(-28 ${ox} ${oy})"/>
</svg>`;
}

/* ═══════════════════════════

const ROSES = [

[

/* ═══════════════════════════

═══════════════════════════ */
for(let i=0;i<14;i++){
  const el=document.createElement('div');

/* ═══════════════════════════
   ROSE CLICK
═══════════════════════════ */
let mahyDone=false, heartIv=null;

function onRose(el, ev) {
  if (mahyDone) return;
  el.classList.add('pop');
  el.addEventListener('animationend', () => el.classList.remove('pop'), {once:true});

  const r = el.getBoundingClientRect();
  const fx = r.left + r.width*.5;
  const fy = r.top  + r.height*.38;

  sparkleExplode(fx, fy, 26);
  for(let i=0;i<15;i++) flyPetal(fx, fy);
  lensFlare(fx, fy);

  // Ripple inside card
  const cr = card.getBoundingClientRect();
  const rpl = document.createElement('div');
  rpl.className = 'rpl';
  rpl.style.left = (fx-cr.left)+'px';
  rpl.style.top  = (fy-cr.top) +'px';

  setTimeout(() => rpl.remove(), 1100);

  // Card shake
  card.classList.add('shk');
  card.addEventListener('animationend', () => card.classList.remove('shk'), {once:true});

  setTimeout(revealMAHY, 960);
}

/* ═══════════════════════════
   SPARKLE EXPLOSION
═══════════════════════════ */
function sparkleExplode(x, y, n) {
  const COLS = ['#ffd700','#ff3d8b','#ffffff','#ffab00','#ff8fab'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;border-radius:50%;pointer-events:none;z-index:300;transform:translate(-50%,-50%);background:${COLS[Math.random()*COLS.length|0]};box-shadow:0 0 6px 3px rgba(255,200,0,.8);`;
    document.body.appendChild(el);
    const ang=(Math.PI*2/n)*i+(Math.random()-.5)*.9;
    const spd=65+Math.random()*140;
    const vx=Math.cos(ang)*spd, vy=Math.sin(ang)*spd;
    const dur=520+Math.random()*480;
    let t0=null;
    (function a(t){
      if(!t0) t0=t;
      const p=(t-t0)/dur;
      if(p>=1){el.remove();return;}
      el.style.left=(x+vx*p)+'px';
      el.style.top =(y+vy*p+130*p*p)+'px';
      el.style.opacity=1-p;
      el.style.transform=`translate(-50%,-50%) scale(${1-p*.6})`;
      requestAnimationFrame(a);
    })(performance.now());
  }
}

/* ═══════════════════════════
   FLYING PETALS
═══════════════════════════ */
function flyPetal(x, y) {
  const COLS=['#ff6b9d','#ff3d8b','#ffd700','#ff8fab','#ffc6d3','#f06292'];
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${8+Math.random()*10}px;height:${10+Math.random()*14}px;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;background:${COLS[Math.random()*COLS.length|0]};pointer-events:none;z-index:300;transform:translate(-50%,-50%);`;
  document.body.appendChild(el);
  const ang=-Math.PI*.5+(Math.random()-.5)*Math.PI*1.7;
  const spd=52+Math.random()*115;
  const vx=Math.cos(ang)*spd, vy=Math.sin(ang)*spd;
  const rot=Math.random()*720-360;
  const dur=880+Math.random()*750;
  let t0=null;
  (function a(t){
    if(!t0) t0=t;
    const p=(t-t0)/dur;
    if(p>=1){el.remove();return;}
    el.style.left=(x+vx*p+Math.sin(p*5)*20)+'px';
    el.style.top =(y+vy*p+190*p*p)+'px';
    el.style.opacity=p<.85?1:(1-p)*6.5;
    el.style.transform=`translate(-50%,-50%) rotate(${rot*p}deg)`;
    requestAnimationFrame(a);
  })(performance.now());
}

/* ═══════════════════════════
   MAHY CINEMATIC REVEAL
═══════════════════════════ */
function revealMAHY() {
  if(mahyDone) return;
  mahyDone = true;

  const mo=$('mo'), gr=$('gr'), rc=$('rc'), mt=$('mt'), ms=$('ms');
  const lts=['lM','lA','lH','lY'].map(id => $(id));

  // Build light rays
  for(let i=0;i<12;i++){
    const ray=document.createElement('div');
    ray.className='ray';
    ray.style.cssText=`transform:rotate(${(360/12)*i}deg);height:${190+Math.random()*120}px;opacity:${.22+Math.random()*.5};`;
    rc.appendChild(ray);
  }

  mo.classList.add('vis');

  // Cinematic letter animations
  const ANIMS=[
    {el:lts[0], fx:-190, fy:0,   fr:-210, delay:0},
    {el:lts[1], fx:0,   fy:-190, fr:210,  delay:390},
    {el:lts[2], fx:190, fy:0,    fr:-210, delay:780},
    {el:lts[3], fx:0,   fy:190,  fr:210,  delay:1170},
  ];

  ANIMS.forEach(({el,fx,fy,fr,delay}) => {
    setTimeout(() => {
      if(typeof el.animate === 'function'){
        el.animate([
          {opacity:0, filter:'blur(30px)', transform:`translate(${fx}px,${fy}px) scale(.18) rotate(${fr}deg)`},
          {opacity:1, filter:'blur(3px)',  transform:`translate(${fx*.07}px,${fy*.07}px) scale(1.25) rotate(${fr*.04}deg)`, offset:.62},
          {opacity:1, filter:'blur(.5px)', transform:`translate(0,0) scale(.95) rotate(${-fr*.02}deg)`, offset:.82},
          {opacity:1, filter:'blur(0)',    transform:`translate(0,0) scale(1) rotate(0deg)`},
        ],{duration:960, easing:'cubic-bezier(.175,.885,.32,1.275)', fill:'forwards'});
      } else {
        el.style.opacity='1'; el.style.filter='none'; el.style.transform='none';
      }
      // Mini burst on each letter arrival
      setTimeout(() => {
        const r2=el.getBoundingClientRect();
        sparkleExplode(r2.left+r2.width/2, r2.top+r2.height*.5, 8);
      }, 620);
    }, delay);
  });

  // After all letters (1170+960 ≈ 2150ms)
  const POST = 2260;
  setTimeout(() => {
    // Shine sweep
    ms.style.opacity='1';
    ms.style.animation='msGo 1.1s ease forwards';
    // Glow ring
    gr.classList.add('show');
    // Light rays
    rc.classList.add('show');
    // Letters pulse
    lts.forEach((l,i) => setTimeout(() => l.classList.add('pulse'), i*120));
    // Big burst on completed word
    const mtr=mt.getBoundingClientRect();
    sparkleExplode(mtr.left+mtr.width*.5, mtr.top+mtr.height*.5, 42);
    lensFlare(mtr.left+mtr.width*.5, mtr.top+mtr.height*.5);
  }, POST);

  // Post-MAHY
  setTimeout(postMAHY, POST+750);
}

/* ═══════════════════════════
   CONFETTI
═══════════════════════════ */
let confPts=[], confOn=false;

function startConfetti(dur) {
  confOn=true;
  const cols=['#ff3d8b','#ffd700','#ff0000','#ff8fab','#ffe082','#ff6b9d','#f48fb1','#fff176','#ce93d8'];
  for(let i=0;i<190;i++){
    confPts.push({
      x:Math.random()*W, y:Math.random()*-H*.65,
      w:3+Math.random()*11, h:2+Math.random()*9,
      col:cols[Math.random()*cols.length|0],
      vy:.7+Math.random()*2.9, vx:(Math.random()-.5)*1.9,
      rot:Math.random()*360, rs:(Math.random()-.5)*7.5,
      op:.7+Math.random()*.3, circle:Math.random()<.3,
    });
  }
  setTimeout(() => confOn=false, dur);
}

function drawConf() {
  cX.clearRect(0,0,W,H);
  confPts=confPts.filter(p => {
    p.y+=p.vy; p.x+=p.vx+Math.sin(p.y/82)*.55; p.rot+=p.rs;
    if(p.y>H+25) return false;
    cX.save(); cX.globalAlpha=p.op;
    cX.translate(p.x,p.y); cX.rotate(p.rot*Math.PI/180);
    cX.fillStyle=p.col;
    if(p.circle){ cX.beginPath(); cX.arc(0,0,p.w/2,0,6.283); cX.fill(); }
    else cX.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cX.restore();
    return true;
  });
  if(confOn && Math.random()<.28){
    const cols=['#ff3d8b','#ffd700','#ff0000','#ff8fab','#ffe082','#ff6b9d','#ce93d8'];
    confPts.push({
      x:Math.random()*W, y:-10,
      w:3+Math.random()*11, h:2+Math.random()*9,
      col:cols[Math.random()*cols.length|0],
      vy:.7+Math.random()*2.9, vx:(Math.random()-.5)*1.9,
      rot:Math.random()*360, rs:(Math.random()-.5)*7.5,
      op:.7+Math.random()*.3, circle:Math.random()<.3,
    });
  }
}

/* ═══════════════════════════
   MAIN ANIMATION LOOP
═══════════════════════════ */
function loop() {
  requestAnimationFrame(loop);
  drawStars();
  drawConf();
  // Smooth parallax
  crX += (trX-crX)*.085;
  crY += (trY-crY)*.085;
  cw.style.transform=`rotateX(${crX}deg) rotateY(${crY}deg)`;
}
requestAnimationFrame(loop);

let melIdx=0, actx=null, playing=false, schedT=null;

function playNote(ac,freq,t,dur,vol=.15){
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='sine'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.05);
  g.gain.exponentialRampToValueAtTime(vol*.65,t+dur*.55);
  g.gain.linearRampToValueAtTime(.0001,t+dur-.04);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+dur+.06);
}

function scheduleMelody(){
  if(!actx||!playing) return;
  const MEL=MELODIES[melIdx++%MELODIES.length];
  let t=actx.currentTime+.1, tot=0;
  MEL.forEach(([f,d])=>{
    playNote(actx,f,t,d,.15);
    playNote(actx,f*2,t,d,.038);
    playNote(actx,f*.5,t,d,.065);
    t+=d; tot+=d;
  });
  schedT=setTimeout(scheduleMelody,(tot-.4)*1e3);
}

$('mb').addEventListener('click', () => {
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(!playing){
    playing=true; $('mb').textContent='♫'; $('mb').classList.add('on');
    scheduleMelody();
  } else {
    playing=false; $('mb').textContent='♪'; $('mb').classList.remove('on');
    clearTimeout(schedT); actx.close(); actx=null;

});
